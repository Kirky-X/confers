# 服务器配置
[server]
host = "localhost"
port = 8080
workers = 4

# 数据库配置
[database]
url = "postgresql://localhost/mydb"
max_connections = 20
connection_timeout = 30

# 功能开关
[feature]
new_ui = true
beta_api = false
realtime_notification = true

# 渐进式重载配置
[reload]
strategy = "canary"

[reload.canary]
initial_ratio = 10
step_ratio = 10
interval_seconds = 5
trial_duration_seconds = 10
